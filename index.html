<!DOCTYPE html>

<html>
<head>
  <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
  <title> Clique para descobrir</title>
</head>
<body>
  <h1>
    Clique para descobrir!!
  </h1>
  <h2 id="texto" style="filter: blur(5px); opacity: 0.3; transition: 0.8s;">
Te amo
</h2>
  <img src="gatolegal.png" id="imagem" style="opacity: 0; transition: 0.8s; width: 200px;">

<button onclick="mostrarTexto()" style="padding: 10px; font-size: 16px;">
clique aqui para descobrir oq ta escrito
</button>

<script>
function mostrarTexto() {
    var texto = document.getElementById("texto");
    texto.style.filter = "blur(0px)";
    texto.style.opacity = "1";

    var imagem = document.getElementById("imagem");
    imagem.style.opacity = "1";

    var botao = document.querySelector("button");
    botao.style.display = "none";
}

</script>
  <h6>Feito por mim mesmo</h6>
</body>
</html>
